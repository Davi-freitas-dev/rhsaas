upstream rhsaas_demo_gunicorn {
    server 127.0.0.1:8000;
}

server {
    listen 80;
    server_name api-demo-rh.taquiondev.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api-demo-rh.taquiondev.com.br;

    ssl_certificate /etc/letsencrypt/live/api-demo-rh.taquiondev.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-demo-rh.taquiondev.com.br/privkey.pem;

    client_max_body_size 20m;

    location /static/ {
        alias /opt/rhsaas/staticfiles/;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_pass http://rhsaas_demo_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
