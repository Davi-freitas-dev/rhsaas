upstream rhsaas_demo_gunicorn {
    server 127.0.0.1:8000;
}

limit_req_zone $binary_remote_addr zone=rhsaas_demo_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=rhsaas_demo_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=rhsaas_demo_sensitive:10m rate=5r/m;
limit_req_status 429;

server {
    listen 80;
    server_name api-demo-rh.taquiondev.com.br;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api-demo-rh.taquiondev.com.br;

    ssl_certificate /etc/letsencrypt/live/api-demo-rh.taquiondev.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-demo-rh.taquiondev.com.br/privkey.pem;

    client_max_body_size 1m;

    location /static/ {
        alias /opt/rhsaas/staticfiles/;
        access_log off;
        expires 30d;
    }

    location = /api/auth/login/ {
        limit_req zone=rhsaas_demo_auth burst=5 nodelay;
        proxy_pass http://rhsaas_demo_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location ~ ^/(api/backups|backups/.*/download|api/obrigacoes-financeiras/exportar/) {
        limit_req zone=rhsaas_demo_sensitive burst=3 nodelay;
        proxy_pass http://rhsaas_demo_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }

    location / {
        limit_req zone=rhsaas_demo_api burst=30 nodelay;
        proxy_pass http://rhsaas_demo_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
